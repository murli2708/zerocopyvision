<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" font-family="'Inter','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C0703"/><stop offset="0.5" stop-color="#241206"/><stop offset="1" stop-color="#3A1505"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FB923C" stop-opacity="0.30"/><stop offset="1" stop-color="#FB923C" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#38BDF8" stop-opacity="0.22"/><stop offset="1" stop-color="#38BDF8" stop-opacity="0"/></radialGradient>
    <radialGradient id="lens" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#93C5FD"/><stop offset="0.5" stop-color="#1D4ED8"/><stop offset="1" stop-color="#0B1120"/></radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ds" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/></filter>
    <marker id="orng" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#FB923C"/></marker>
    <marker id="cyan" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#38BDF8"/></marker>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="320" fill="url(#glowA)"/>
  <circle cx="980" cy="320" r="240" fill="url(#glowB)"/>
  <rect x="0" y="0" width="6" height="440" fill="#FB923C"/>

  <g transform="translate(64,46)">
    <rect x="0" y="0" width="226" height="38" rx="19" fill="#FB923C" fill-opacity="0.12" stroke="#FB923C" stroke-opacity="0.55"/>
    <circle cx="26" cy="19" r="6" fill="#FB923C" filter="url(#soft)"/>
    <text x="44" y="25" fill="#FDBA74" font-family="'JetBrains Mono',monospace" font-size="16" letter-spacing="3">PHASE 3 · THE EYES</text>
  </g>
  <text x="1216" y="52" text-anchor="end" fill="#9A6A45" font-family="'JetBrains Mono',monospace" font-size="15" letter-spacing="2">AURORA SERIES · 03 / 06</text>

  <text x="62" y="172" fill="#FFFFFF" font-size="72" font-weight="800" letter-spacing="-2">ZeroCopyVision</text>
  <text x="64" y="214" fill="#FDBA74" font-size="26" font-weight="500">Real-time sight, no pixel copied twice.</text>
  <text x="64" y="246" fill="#B98A63" font-size="18" font-family="'JetBrains Mono',monospace">a Rust core, a zero-copy FFI boundary, a locked frame rate</text>

  <g transform="translate(64,286)" font-family="'JetBrains Mono',monospace">
    <g filter="url(#ds)">
      <rect x="0" y="0" width="170" height="74" rx="14" fill="#1A0E06" stroke="#FB923C" stroke-opacity="0.4"/>
      <text x="16" y="34" fill="#FDBA74" font-size="26" font-weight="800">60 fps</text>
      <text x="16" y="58" fill="#B98A63" font-size="13">locked UI, no jank</text>
    </g>
    <g filter="url(#ds)" transform="translate(186,0)">
      <rect x="0" y="0" width="150" height="74" rx="14" fill="#1A0E06" stroke="#FB923C" stroke-opacity="0.4"/>
      <text x="16" y="34" fill="#FDBA74" font-size="26" font-weight="800">0</text>
      <text x="16" y="58" fill="#B98A63" font-size="13">per-frame copies</text>
    </g>
    <g filter="url(#ds)" transform="translate(352,0)">
      <rect x="0" y="0" width="174" height="74" rx="14" fill="#1A0E06" stroke="#FB923C" stroke-opacity="0.4"/>
      <text x="16" y="34" fill="#FDBA74" font-size="26" font-weight="800">≤ 33 ms</text>
      <text x="16" y="58" fill="#B98A63" font-size="13">p95 latency</text>
    </g>
  </g>

  <g transform="translate(792,64)" filter="url(#ds)">
    <rect x="0" y="0" width="424" height="312" rx="20" fill="#170B04" fill-opacity="0.74" stroke="#FB923C" stroke-opacity="0.32"/>
    <text x="24" y="34" fill="#FDBA74" font-family="'JetBrains Mono',monospace" font-size="14" letter-spacing="2">ZERO-COPY FRAME PATH</text>
    <line x1="24" y1="46" x2="400" y2="46" stroke="#FB923C" stroke-opacity="0.18"/>

    <g transform="translate(0,150)">
      <!-- camera lens -->
      <g transform="translate(88,0)">
        <circle r="50" fill="#0B1120" stroke="#FB923C" stroke-width="3"/>
        <circle r="38" fill="url(#lens)"/>
        <circle r="38" fill="none" stroke="#93C5FD" stroke-opacity="0.4" stroke-width="2"/>
        <circle cx="-12" cy="-12" r="9" fill="#DBEAFE" opacity="0.85"/>
        <text x="0" y="74" fill="#FDBA74" font-size="13" text-anchor="middle" font-family="'JetBrains Mono',monospace">camera</text>
      </g>
      <!-- handoff arrow -->
      <path d="M142 0 H196" stroke="#FB923C" stroke-width="3.5" marker-end="url(#orng)"/>
      <text x="169" y="-14" fill="#FCD34D" font-size="12" text-anchor="middle" font-family="'JetBrains Mono',monospace">ptr+stride</text>
      <text x="169" y="20" fill="#9A7B5A" font-size="11" text-anchor="middle" font-family="'JetBrains Mono',monospace">no copy</text>
      <!-- Rust core -->
      <g transform="translate(206,-46)">
        <rect x="0" y="0" width="92" height="92" rx="14" fill="#1A0E06" stroke="#FB923C" stroke-width="3"/>
        <g transform="translate(46,38)">
          <circle r="18" fill="none" stroke="#FB923C" stroke-width="5"/>
          <g stroke="#FB923C" stroke-width="5"><line x1="0" y1="-26" x2="0" y2="-18"/><line x1="0" y1="18" x2="0" y2="26"/><line x1="-26" y1="0" x2="-18" y2="0"/><line x1="18" y1="0" x2="26" y2="0"/><line x1="-18" y1="-18" x2="-13" y2="-13"/><line x1="13" y1="13" x2="18" y2="18"/><line x1="18" y1="-18" x2="13" y2="-13"/><line x1="-13" y1="13" x2="-18" y2="18"/></g>
          <circle r="6" fill="#1A0E06"/>
        </g>
        <text x="46" y="80" fill="#FDBA74" font-size="13" text-anchor="middle" font-family="'JetBrains Mono',monospace">Rust</text>
      </g>
      <!-- result arrow -->
      <path d="M308 0 H342" stroke="#38BDF8" stroke-width="3.5" marker-end="url(#cyan)"/>
      <!-- detections frame -->
      <g transform="translate(350,-50)">
        <rect x="0" y="0" width="58" height="100" rx="9" fill="#0B1120" stroke="#38BDF8" stroke-width="2.5"/>
        <rect x="10" y="16" width="26" height="30" rx="3" fill="none" stroke="#34D399" stroke-width="3"/>
        <rect x="10" y="16" width="18" height="9" fill="#34D399"/>
        <rect x="30" y="52" width="20" height="32" rx="3" fill="none" stroke="#FBBF24" stroke-width="3"/>
        <text x="29" y="90" fill="#7DD3FC" font-size="10" text-anchor="middle" font-family="'JetBrains Mono',monospace">boxes</text>
      </g>
    </g>

    <line x1="24" y1="272" x2="400" y2="272" stroke="#FB923C" stroke-opacity="0.18"/>
    <text x="212" y="294" fill="#C9A079" font-size="13" text-anchor="middle" font-family="'JetBrains Mono',monospace">heavy bytes never leave native memory</text>
  </g>

  <g transform="translate(64,402)" font-family="'JetBrains Mono',monospace" font-size="13" fill="#FDBA74">
    <g><rect x="0" y="0" width="58" height="26" rx="13" fill="#FB923C" fill-opacity="0.14"/><text x="29" y="17" text-anchor="middle">Rust</text></g>
    <g transform="translate(70,0)"><rect x="0" y="0" width="64" height="26" rx="13" fill="#FB923C" fill-opacity="0.14"/><text x="32" y="17" text-anchor="middle">Dart FFI</text></g>
    <g transform="translate(146,0)"><rect x="0" y="0" width="78" height="26" rx="13" fill="#FB923C" fill-opacity="0.14"/><text x="39" y="17" text-anchor="middle">Flutter</text></g>
    <g transform="translate(236,0)"><rect x="0" y="0" width="118" height="26" rx="13" fill="#FB923C" fill-opacity="0.14"/><text x="59" y="17" text-anchor="middle">camera · 60fps</text></g>
  </g>
</svg>
